<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#E8001A">
  <title>Sarita POS</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#222}
    .pos{max-width:430px;margin:0 auto;padding:12px}

    /* Header */
    .header{background:#E8001A;border-radius:14px;padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
    .header img{height:32px;filter:brightness(0) invert(1)}
    .header-sub{font-size:12px;color:rgba(255,255,255,0.8);font-weight:400}

    /* Demo banner */
    .demo-banner{background:#fff3cd;border:1.5px solid #ffc107;border-radius:10px;padding:8px 14px;margin-bottom:10px;text-align:center;font-size:12px;color:#856404;font-weight:600}

    /* Cards */
    .card{background:#fff;border:0.5px solid #e8e8e8;border-radius:14px;padding:14px;margin-bottom:10px}
    .card-gray{background:#fafafa}
    .sec{font-size:10px;color:#999;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}

    /* Categorías */
    .cats{display:flex;flex-wrap:wrap;gap:6px}
    .cat-btn{font-size:13px;padding:6px 13px;border-radius:20px;border:1.5px solid #e0e0e0;background:#fff;color:#666;cursor:pointer;font-weight:500;transition:all .15s}
    .cat-btn.active{background:#E8001A;border-color:#E8001A;color:#fff}

    /* Productos */
    .prods{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:250px;overflow-y:auto}
    .prod-btn{padding:10px 9px;border-radius:10px;border:1.5px solid #ebebeb;background:#fff;cursor:pointer;text-align:left;transition:border-color .15s}
    .prod-btn:active{border-color:#E8001A;background:#fff8f8}
    .prod-nombre{font-size:13px;font-weight:600;color:#222;line-height:1.3}
    .prod-precio{font-size:12px;color:#E8001A;margin-top:3px;font-weight:600}

    /* Orden */
    .orden-vacia{color:#ccc;font-size:13px;text-align:center;padding:16px 0}
    .oitem{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid #f0f0f0}
    .oitem:last-child{border-bottom:none}
    .oitem-nombre{font-size:13px;color:#222;flex:1;line-height:1.2;font-weight:500}
    .qty-ctrl{display:flex;align-items:center;gap:6px}
    .qbtn{width:24px;height:24px;border-radius:50%;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#444;line-height:1;font-weight:500}
    .qnum{font-size:13px;font-weight:600;min-width:18px;text-align:center;color:#222}
    .oitem-total{font-size:13px;font-weight:600;min-width:44px;text-align:right;color:#222}
    .total-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0}
    .total-label{font-size:14px;color:#888;font-weight:500}
    .total-val{font-size:24px;font-weight:700;color:#222}

    /* Cobro */
    .billete-wrap{margin-bottom:8px}
    .billete-wrap input{width:100%;padding:10px 12px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:16px;color:#222;background:#fff;outline:none}
    .billete-wrap input:focus{border-color:#E8001A}
    .bills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
    .bill-btn{padding:6px 11px;font-size:13px;border:1.5px solid #e0e0e0;border-radius:8px;background:#fff;color:#555;cursor:pointer;font-weight:500}
    .bill-btn:active{border-color:#E8001A;color:#E8001A}
    .vuelto-box{display:flex;justify-content:space-between;align-items:center;background:#fff0f0;border:1.5px solid #ffd0d0;border-radius:10px;padding:11px 14px;margin-bottom:12px}
    .vuelto-label{font-size:13px;color:#E8001A;font-weight:600}
    .vuelto-val{font-size:24px;font-weight:700;color:#C0001A}

    /* Método */
    .metodos{display:flex;gap:6px;margin-bottom:12px}
    .met-btn{flex:1;padding:8px;font-size:12px;border:1.5px solid #e0e0e0;border-radius:10px;background:#fff;color:#666;cursor:pointer;text-align:center;font-weight:500}
    .met-btn.active{background:#E8001A;border-color:#E8001A;color:#fff;font-weight:600}

    /* Encargada */
    .enc-select{width:100%;padding:10px 12px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;color:#222;background:#fff;margin-bottom:12px;outline:none}
    .enc-select:focus{border-color:#E8001A}

    /* Botón registrar */
    .btn-reg{width:100%;padding:14px;background:#E8001A;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.02em}
    .btn-reg:disabled{background:#ccc;cursor:not-allowed}

    /* Toast */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:11px 22px;border-radius:10px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99;white-space:nowrap}
    .toast.show{opacity:1}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="pos">

  <div class="header" style="padding:16px 18px">
    <svg viewBox="0 0 200 60" style="height:38px" xmlns="http://www.w3.org/2000/svg">
      <text x="100" y="48" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="52" fill="white" letter-spacing="-1">Sarita</text>
    </svg>
    <div style="display:flex;gap:8px;align-items:center">
      <div id="sync-badge" style="display:none;background:rgba(0,0,0,0.25);border-radius:20px;padding:4px 10px;font-size:12px;color:#fff;font-weight:600;cursor:pointer" onclick="sincronizarPendientes()">⚠ <span id="sync-count">0</span></div>
      <button onclick="verResumen()" style="background:rgba(0,0,0,0.2);border:none;border-radius:20px;padding:5px 11px;font-size:12px;color:#fff;font-weight:600;cursor:pointer">📊 Hoy</button>
    </div>
  </div>

  <!-- Banner demo — solo visible en modo demo -->
  <div class="demo-banner" id="demo-banner" style="display:none">
    🧪 Modo demo — las ventas no se guardan
  </div>

  <div class="card">
    <div class="sec">Categoría</div>
    <div class="cats" id="cats"><div style="color:#ccc;font-size:13px">Cargando...</div></div>
  </div>

  <div class="card">
    <div class="sec">Productos</div>
    <div class="prods" id="prods">
      <div style="grid-column:1/-1;color:#ccc;font-size:13px;text-align:center;padding:20px 0">Seleccioná una categoría</div>
    </div>
    <div id="sabor-wrap" style="display:none;margin-top:10px">
      <div class="sec" style="margin-top:4px">Sabor</div>
      <select id="sabor-select" class="enc-select" style="margin-bottom:0">
        <option value="">— Seleccionar sabor —</option>
      </select>
    </div>
  </div>

  <div class="card card-gray">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="sec" style="margin-bottom:0">Orden</div>
      <button onclick="cancelarOrden()" style="font-size:12px;color:#999;border:none;background:none;cursor:pointer;padding:2px 6px">✕ Cancelar</button>
    </div>
    <div id="orden"><div class="orden-vacia">Sin productos aún</div></div>
    <div class="total-row">
      <span class="total-label">Total</span>
      <span class="total-val" id="total">$0.00</span>
    </div>
  </div>

  <div class="card">
    <div class="sec">Cobro</div>
    <div id="cobro-efectivo">
    <div class="billete-wrap">
      <input type="number" id="billete" placeholder="Billete del cliente ($)" min="0" step="0.25" oninput="calcVuelto()">
    </div>
    <div class="bills">
      <button class="bill-btn" onclick="setBillete(1)">$1</button>
      <button class="bill-btn" onclick="setBillete(5)">$5</button>
      <button class="bill-btn" onclick="setBillete(10)">$10</button>
      <button class="bill-btn" onclick="setBillete(20)">$20</button>
      <button class="bill-btn" onclick="setBillete(50)">$50</button>
    </div>
    <div class="vuelto-box">
      <span class="vuelto-label">Vuelto</span>
      <span class="vuelto-val" id="vuelto">$0.00</span>
    </div>
    </div>
    <div class="sec">Método de pago</div>
    <div class="metodos">
      <button class="met-btn active" id="met-efectivo" onclick="setMetodo('Efectivo')">Efectivo</button>
      <button class="met-btn" id="met-tarjeta" onclick="setMetodo('Tarjeta')">Tarjeta</button>
      <button class="met-btn" id="met-pedidosya" onclick="setMetodo('Pedidos Ya')">Pedidos Ya</button>
    </div>
    <div class="sec">Encargada</div>
    <select class="enc-select" id="encargada">
      <option value="">— Seleccionar —</option>
      <option>Demo User</option>
    </select>
    <button class="btn-reg" id="btn-reg" onclick="abrirConfirm()">Registrar venta</button>
  </div>

</div>

<!-- Modal confirmación -->
<div id="modal-confirm" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:flex-end;justify-content:center">
  <div style="background:#fff;border-radius:16px 16px 0 0;padding:24px;width:100%;max-width:430px">
    <p style="font-size:15px;font-weight:600;color:#222;margin-bottom:6px;text-align:center">¿Confirmar venta?</p>
    <p style="font-size:13px;color:#888;text-align:center;margin-bottom:16px" id="confirm-detalle"></p>
    <div style="display:flex;gap:10px">
      <button onclick="cerrarConfirm()" style="flex:1;padding:12px;border:1.5px solid #e0e0e0;border-radius:10px;background:#fff;font-size:14px;font-weight:600;cursor:pointer;color:#666">Cancelar</button>
      <button onclick="confirmarVenta()" style="flex:1;padding:12px;border:none;border-radius:10px;background:#E8001A;color:#fff;font-size:14px;font-weight:600;cursor:pointer">Confirmar</button>
    </div>
  </div>
</div>

<!-- Modal resumen del día -->
<div id="modal-resumen" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:16px;padding:24px;width:90%;max-width:380px">
    <p style="font-size:16px;font-weight:700;color:#222;margin-bottom:16px;text-align:center">Resumen del día</p>
    <div id="resumen-contenido"></div>
    <button onclick="cerrarResumen()" style="width:100%;padding:12px;border:none;border-radius:10px;background:#E8001A;color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:16px">Cerrar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIGURACIÓN — solo cambiá esta línea para alternar modos
// true  = modo demo (para portfolio/recruiters, no guarda nada)
// false = modo real (kiosco Sarita, guarda en Google Sheets)
// ============================================================
const DEMO_MODE = true;

const SCRIPT_URL_REAL = 'https://script.google.com/macros/s/AKfycby_0-BmUk80e-KeKOHa0KzRLwY1QvSiqI-aS0JPvn7OCfPyiJSaxOqJGpADS86kmI0dXA/exec';
const SCRIPT_URL_DEMO = 'https://script.google.com/macros/s/AKfycbzpujranJfSGtEmANsDut-BQeFOHDdwdPTTisj5L4nEnPMiMUUAUW8Dewp5SxJy7tWY1w/exec';
const SCRIPT_URL = DEMO_MODE ? SCRIPT_URL_DEMO : SCRIPT_URL_REAL;

const TURNO = '11am-8pm';
const CATS_ORDER = ['Bebidas','Conos','Especialidades','Mini Especialidades','Peleteria','Envasados','Pasteles','Otros'];
let productos=[], saboresCat={}, catActiva='', orden=[], metodo='Efectivo', total=0;
const CATS_SABOR = ['Envasados','Conos','Bebidas','Otros'];

// Mostrar banner demo si aplica
if (DEMO_MODE) document.getElementById('demo-banner').style.display = 'block';

function cargarSabores(){
  window._saboresCallback=function(data){
    if(data.success) saboresCat=data.sabores;
    const s=document.getElementById('jsonp-sabores'); if(s) s.remove();
  };
  const script=document.createElement('script');
  script.id='jsonp-sabores';
  script.src=SCRIPT_URL+'?action=sabores&callback=_saboresCallback';
  document.head.appendChild(script);
}

function cargarProductos(){
  window._jsonpCallback=function(data){
    if(data.success){ productos=data.productos; renderCats(); }
    else{ document.getElementById('cats').innerHTML='<div style="color:#E8001A;font-size:13px">Error al cargar</div>'; }
    const s=document.getElementById('jsonp-script'); if(s) s.remove();
  };
  const script=document.createElement('script');
  script.id='jsonp-script';
  script.src=SCRIPT_URL+'?callback=_jsonpCallback';
  script.onerror=function(){ document.getElementById('cats').innerHTML='<div style="color:#E8001A;font-size:13px">Error de conexión</div>'; };
  document.head.appendChild(script);
}

function renderCats(){
  const cats=[...new Set(productos.map(p=>p.categoria))];
  cats.sort((a,b)=>{ const ia=CATS_ORDER.indexOf(a),ib=CATS_ORDER.indexOf(b); return(ia===-1?99:ia)-(ib===-1?99:ib); });
  document.getElementById('cats').innerHTML=cats.map(c=>`<button class="cat-btn${c===catActiva?' active':''}" onclick="selCat('${c}')">${c}</button>`).join('');
}

function selCat(cat){
  catActiva=cat; renderCats();
  const prods=productos.filter(p=>p.categoria===cat);
  document.getElementById('prods').innerHTML=prods.map(p=>`<button class="prod-btn" onclick="agregarItem('${p.sku}')"><div class="prod-nombre">${p.producto}</div></button>`).join('');
  const wrap=document.getElementById('sabor-wrap');
  const sel=document.getElementById('sabor-select');
  if(CATS_SABOR.includes(cat)&&saboresCat[cat]){
    sel.innerHTML='<option value="">— Seleccionar sabor —</option>'+saboresCat[cat].map(s=>`<option value="${s}">${s}</option>`).join('');
    wrap.style.display='block';
  } else { wrap.style.display='none'; sel.value=''; }
}

function agregarItem(sku){
  const prod=productos.find(p=>p.sku===sku); if(!prod) return;
  const sabor=CATS_SABOR.includes(prod.categoria)?document.getElementById('sabor-select').value:'';
  if(CATS_SABOR.includes(prod.categoria)&&!sabor){ showToast('Seleccioná un sabor primero'); return; }
  const key=sku+'|'+sabor;
  const ex=orden.find(i=>i.key===key);
  if(ex){ ex.qty++; } else { orden.push({key,sku,nombre:prod.producto,precio:Number(prod.precio),qty:1,categoria:prod.categoria,tamano:prod.tamano,sabor}); }
  renderOrden();
}

function cambiarQty(key,delta){
  const idx=orden.findIndex(i=>i.key===key); if(idx===-1) return;
  orden[idx].qty+=delta; if(orden[idx].qty<=0) orden.splice(idx,1);
  renderOrden();
}

function renderOrden(){
  const el=document.getElementById('orden');
  if(orden.length===0){ el.innerHTML='<div class="orden-vacia">Sin productos aún</div>'; total=0; }
  else{
    total=orden.reduce((s,i)=>s+i.precio*i.qty,0);
    el.innerHTML=orden.map(i=>`<div class="oitem"><div class="oitem-nombre">${i.nombre}${i.sabor?' <span style="font-size:11px;color:#999">('+i.sabor+')</span>':''}</div><div class="qty-ctrl"><button class="qbtn" onclick="cambiarQty('${i.key}',-1)">−</button><span class="qnum">${i.qty}</span><button class="qbtn" onclick="cambiarQty('${i.key}',1)">+</button></div></div>`).join('');
  }
  document.getElementById('total').textContent='';
  document.getElementById('total').style.display='none';
  calcVuelto();
}

function calcVuelto(){
  const billete=parseFloat(document.getElementById('billete').value)||0;
  const vuelto=billete-total;
  const el=document.getElementById('vuelto');
  el.textContent=vuelto>=0?'$'+vuelto.toFixed(2):'—';
  el.style.color=vuelto<0?'#E8001A':'#C0001A';
}

function setBillete(val){ document.getElementById('billete').value=val; calcVuelto(); }

function setMetodo(m){
  metodo=m;
  document.getElementById('met-efectivo').classList.toggle('active',m==='Efectivo');
  document.getElementById('met-tarjeta').classList.toggle('active',m==='Tarjeta');
  document.getElementById('met-pedidosya').classList.toggle('active',m==='Pedidos Ya');
  const soloEfectivo=m==='Efectivo';
  document.getElementById('cobro-efectivo').style.display=soloEfectivo?'block':'none';
  if(!soloEfectivo){ document.getElementById('billete').value=''; document.getElementById('vuelto').textContent='—'; }
}

function prepararConfirm(){
  if(orden.length===0){ showToast('Agregá al menos un producto'); return false; }
  const encargada=document.getElementById('encargada').value;
  const billete=parseFloat(document.getElementById('billete').value)||0;
  const encSel=document.getElementById('encargada');
  let valido=true;
  if(!encargada){ encSel.style.borderColor='#E8001A'; showToast('Seleccioná la encargada'); valido=false; }
  else{ encSel.style.borderColor='#e0e0e0'; }
  if(metodo==='Efectivo'&&billete<total&&total>0){
    document.getElementById('billete').style.borderColor='#E8001A';
    showToast('El billete es menor al total'); valido=false;
  } else { document.getElementById('billete').style.borderColor='#e0e0e0'; }
  return valido;
}

function abrirConfirm(){
  if(!prepararConfirm()) return;
  const items=orden.map(i=>`${i.qty}x ${i.nombre}`).join(', ');
  document.getElementById('confirm-detalle').textContent=`${items} (${metodo})`;
  document.getElementById('modal-confirm').style.display='flex';
}

function cerrarConfirm(){ document.getElementById('modal-confirm').style.display='none'; }

async function confirmarVenta(){
  cerrarConfirm();
  const encargada=document.getElementById('encargada').value;
  const btn=document.getElementById('btn-reg');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Registrando...';

  const ventasData=orden.map(i=>({
    encargada, turno:TURNO, categoria:i.categoria, producto:i.nombre,
    tamano:i.tamano, cantidad:i.qty, precio_unitario:i.precio,
    total_venta:+(i.precio*i.qty).toFixed(2), metodo_pago:metodo,
    sabor:i.sabor||'', _ts:Date.now()
  }));

  // En modo demo: simular registro sin guardar nada real
  if(DEMO_MODE){
    await new Promise(r=>setTimeout(r,800)); // simular latencia
    guardarVentasHoy(ventasData);
    showToast('✓ Venta registrada (demo)');
    limpiarOrden(); btn.disabled=false; btn.innerHTML='Registrar venta';
    return;
  }

  // Modo real
  if(!navigator.onLine){
    guardarPendientes(ventasData);
    showToast('Sin internet — guardado localmente');
    limpiarOrden(); btn.disabled=false; btn.innerHTML='Registrar venta';
    return;
  }
  let todasOk=true;
  for(const v of ventasData){
    try{ await enviarVenta(v); }
    catch(e){ todasOk=false; guardarPendientes([v]); }
  }
  if(todasOk){ guardarVentasHoy(ventasData); showToast('✓ Venta registrada'); }
  else{ showToast('Parte guardada localmente'); }
  limpiarOrden(); btn.disabled=false; btn.innerHTML='Registrar venta';
}

function limpiarOrden(){
  orden=[]; renderOrden();
  document.getElementById('billete').value='';
  calcVuelto();
}

function enviarVenta(datos){
  return new Promise((resolve,reject)=>{
    const cbName='_vcb'+Date.now();
    const timer=setTimeout(()=>{ delete window[cbName]; const s=document.getElementById('jsonp-venta'); if(s) s.remove(); reject('timeout'); },8000);
    window[cbName]=function(data){
      clearTimeout(timer); delete window[cbName];
      const s=document.getElementById('jsonp-venta'); if(s) s.remove();
      data.success?resolve():reject('fail');
    };
    const {_ts,...datosSinTs}=datos;
    const params=new URLSearchParams({action:'venta',callback:cbName,...Object.fromEntries(Object.entries(datosSinTs).map(([k,v])=>[k,String(v)]))});
    const script=document.createElement('script');
    script.id='jsonp-venta';
    script.src=SCRIPT_URL+'?'+params.toString();
    script.onerror=()=>{ clearTimeout(timer); reject('error'); };
    document.head.appendChild(script);
  });
}

function guardarPendientes(ventas){
  const pendientes=JSON.parse(localStorage.getItem('sarita_pendientes')||'[]');
  ventas.forEach(v=>pendientes.push(v));
  localStorage.setItem('sarita_pendientes',JSON.stringify(pendientes));
  actualizarBadge();
}

function actualizarBadge(){
  const pendientes=JSON.parse(localStorage.getItem('sarita_pendientes')||'[]');
  const badge=document.getElementById('sync-badge');
  const count=document.getElementById('sync-count');
  if(pendientes.length>0){ badge.style.display='block'; count.textContent=pendientes.length; }
  else{ badge.style.display='none'; }
}

async function sincronizarPendientes(){
  if(DEMO_MODE){ showToast('Modo demo — sin sincronización'); return; }
  const pendientes=JSON.parse(localStorage.getItem('sarita_pendientes')||'[]');
  if(pendientes.length===0){ showToast('No hay ventas pendientes'); return; }
  if(!navigator.onLine){ showToast('Sin internet, intentá después'); return; }
  showToast('Sincronizando...');
  const restantes=[];
  for(const v of pendientes){
    try{ await enviarVenta(v); }
    catch(e){ restantes.push(v); }
  }
  localStorage.setItem('sarita_pendientes',JSON.stringify(restantes));
  actualizarBadge();
  const enviadas=pendientes.length-restantes.length;
  showToast(enviadas>0?`✓ ${enviadas} venta(s) sincronizadas`:'No se pudo sincronizar');
}

function guardarVentasHoy(ventas){
  const guardadas=JSON.parse(localStorage.getItem('sarita_ventas_hoy')||'[]');
  ventas.forEach(v=>guardadas.push(v));
  localStorage.setItem('sarita_ventas_hoy',JSON.stringify(guardadas));
}

function verResumen(){
  const pendientes=JSON.parse(localStorage.getItem('sarita_pendientes')||'[]');
  const ventas=JSON.parse(localStorage.getItem('sarita_ventas_hoy')||'[]');
  const hoy=new Date().toDateString();
  const ventasHoy=ventas.filter(v=>new Date(v._ts).toDateString()===hoy);
  const efectivo=ventasHoy.filter(v=>v.metodo_pago==='Efectivo').reduce((s,v)=>s+Number(v.total_venta),0);
  const tarjeta=ventasHoy.filter(v=>v.metodo_pago==='Tarjeta').reduce((s,v)=>s+Number(v.total_venta),0);
  const pedidosya=ventasHoy.filter(v=>v.metodo_pago==='Pedidos Ya').reduce((s,v)=>s+Number(v.total_venta),0);
  const totalHoy=efectivo+tarjeta+pedidosya;
  document.getElementById('resumen-contenido').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div style="background:#fafafa;border-radius:10px;padding:12px;text-align:center">
        <div style="font-size:11px;color:#999;font-weight:600;text-transform:uppercase;margin-bottom:4px">Total del día</div>
        <div style="font-size:22px;font-weight:700;color:#222">$${totalHoy.toFixed(2)}</div>
      </div>
      <div style="background:#fafafa;border-radius:10px;padding:12px;text-align:center">
        <div style="font-size:11px;color:#999;font-weight:600;text-transform:uppercase;margin-bottom:4px">Transacciones</div>
        <div style="font-size:22px;font-weight:700;color:#222">${ventasHoy.length}</div>
      </div>
    </div>
    <div style="border:0.5px solid #f0f0f0;border-radius:10px;overflow:hidden">
      <div style="display:flex;justify-content:space-between;padding:10px 14px;border-bottom:0.5px solid #f0f0f0">
        <span style="font-size:13px;color:#555">Efectivo</span>
        <span style="font-size:13px;font-weight:600;color:#222">$${efectivo.toFixed(2)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:10px 14px;border-bottom:0.5px solid #f0f0f0">
        <span style="font-size:13px;color:#555">Tarjeta</span>
        <span style="font-size:13px;font-weight:600;color:#222">$${tarjeta.toFixed(2)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:10px 14px">
        <span style="font-size:13px;color:#555">Pedidos Ya</span>
        <span style="font-size:13px;font-weight:600;color:#222">$${pedidosya.toFixed(2)}</span>
      </div>
    </div>
    ${DEMO_MODE?'<p style="font-size:12px;color:#856404;text-align:center;margin-top:10px">🧪 Datos de demostración</p>':''}
    ${!DEMO_MODE&&pendientes.length>0?`<p style="font-size:12px;color:#E8001A;text-align:center;margin-top:10px">⚠ ${pendientes.length} venta(s) pendiente(s) de sincronizar</p>`:''}
  `;
  document.getElementById('modal-resumen').style.display='flex';
}

function cerrarResumen(){ document.getElementById('modal-resumen').style.display='none'; }

function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function cancelarOrden(){
  if(orden.length===0) return;
  if(confirm('¿Cancelar la orden actual?')){ orden=[]; renderOrden(); }
}

cargarProductos();
cargarSabores();
actualizarBadge();
window.addEventListener('online',()=>{ if(!DEMO_MODE){ showToast('Conexión restaurada'); setTimeout(sincronizarPendientes,1000); } });
window.addEventListener('offline',()=>{ if(!DEMO_MODE) showToast('Sin internet — modo offline activo'); });
</script>
</body>
</html>
