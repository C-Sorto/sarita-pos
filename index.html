<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1D9E75">
  <title>Sarita POS</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#1a1a1a}
    .pos{max-width:420px;margin:0 auto;padding:12px}
    .card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:12px;margin-bottom:10px}
    .card-gray{background:#f9f9f9}
    .row{display:flex;justify-content:space-between;align-items:center;gap:8px}
    .sec{font-size:11px;color:#999;font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}
    .cats{display:flex;flex-wrap:wrap;gap:6px}
    .cat-btn{font-size:13px;padding:5px 11px;border-radius:20px;border:0.5px solid #ccc;background:#fff;color:#666;cursor:pointer}
    .cat-btn.active{background:#1D9E75;border-color:#1D9E75;color:#fff}
    .prods{display:grid;grid-template-columns:1fr 1fr;gap:7px;max-height:240px;overflow-y:auto}
    .prod-btn{padding:9px 8px;border-radius:8px;border:0.5px solid #e0e0e0;background:#fff;cursor:pointer;text-align:left}
    .prod-btn:active{border-color:#1D9E75}
    .prod-nombre{font-size:13px;font-weight:500;color:#1a1a1a;line-height:1.3}
    .prod-precio{font-size:12px;color:#1D9E75;margin-top:2px;font-weight:500}
    .orden-vacia{color:#bbb;font-size:13px;text-align:center;padding:14px 0}
    .oitem{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid #eee}
    .oitem:last-child{border-bottom:none}
    .oitem-nombre{font-size:13px;color:#1a1a1a;flex:1;line-height:1.2}
    .qty-ctrl{display:flex;align-items:center;gap:5px}
    .qbtn{width:22px;height:22px;border-radius:50%;border:0.5px solid #ccc;background:#f5f5f5;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:#1a1a1a;line-height:1}
    .qnum{font-size:13px;font-weight:500;min-width:16px;text-align:center}
    .oitem-total{font-size:13px;font-weight:500;min-width:42px;text-align:right}
    .total-label{font-size:14px;color:#666}
    .total-val{font-size:22px;font-weight:500}
    .billete-wrap{display:flex;gap:6px;margin-bottom:7px}
    .billete-wrap input{flex:1;padding:8px 10px;border:0.5px solid #ccc;border-radius:8px;font-size:15px}
    .bills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
    .bill-btn{padding:5px 9px;font-size:13px;border:0.5px solid #ccc;border-radius:8px;background:#f5f5f5;color:#666;cursor:pointer}
    .vuelto-box{display:flex;justify-content:space-between;align-items:center;background:#EAF3DE;border-radius:8px;padding:10px 12px;margin-bottom:10px}
    .vuelto-label{font-size:13px;color:#3B6D11;font-weight:500}
    .vuelto-val{font-size:22px;font-weight:500;color:#27500A}
    .metodos{display:flex;gap:6px;margin-bottom:10px}
    .met-btn{flex:1;padding:7px;font-size:12px;border:0.5px solid #ccc;border-radius:8px;background:#f5f5f5;color:#666;cursor:pointer;text-align:center}
    .met-btn.active{background:#1D9E75;border-color:#1D9E75;color:#fff}
    .enc-select{width:100%;padding:8px 10px;border:0.5px solid #ccc;border-radius:8px;font-size:13px;margin-bottom:10px}
    .btn-reg{width:100%;padding:13px;background:#1D9E75;border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:500;cursor:pointer}
    .btn-reg:disabled{background:#ccc;cursor:not-allowed}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#27500A;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
    .toast.show{opacity:1}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="pos">
  <div class="card card-gray row">
    <span style="font-size:16px;font-weight:500">🍦 Sarita POS</span>
    <span style="font-size:12px;color:#999">11am – 8pm</span>
  </div>
  <div class="card">
    <div class="sec">Categoría</div>
    <div class="cats" id="cats"></div>
  </div>
  <div class="card">
    <div class="sec">Productos</div>
    <div class="prods" id="prods">
      <div style="grid-column:1/-1;color:#bbb;font-size:13px;text-align:center;padding:20px 0">Seleccioná una categoría</div>
    </div>
  </div>
  <div class="card card-gray">
    <div class="sec">Orden</div>
    <div id="orden"><div class="orden-vacia">Sin productos aún</div></div>
    <div class="row" style="margin-top:10px;padding-top:8px;border-top:0.5px solid #eee">
      <span class="total-label">Total</span>
      <span class="total-val" id="total">$0.00</span>
    </div>
  </div>
  <div class="card">
    <div class="sec">Cobro</div>
    <div class="billete-wrap">
      <input type="number" id="billete" placeholder="Billete del cliente ($)" min="0" step="0.25" oninput="calcVuelto()">
    </div>
    <div class="bills">
      <button class="bill-btn" onclick="setBillete(1)">$1</button>
      <button class="bill-btn" onclick="setBillete(5)">$5</button>
      <button class="bill-btn" onclick="setBillete(10)">$10</button>
      <button class="bill-btn" onclick="setBillete(20)">$20</button>
      <button class="bill-btn" onclick="setBillete(50)">$50</button>
    </div>
    <div class="vuelto-box">
      <span class="vuelto-label">Vuelto</span>
      <span class="vuelto-val" id="vuelto">$0.00</span>
    </div>
    <div class="sec">Método de pago</div>
    <div class="metodos">
      <button class="met-btn active" id="met-efectivo" onclick="setMetodo('Efectivo')">Efectivo</button>
      <button class="met-btn" id="met-tarjeta" onclick="setMetodo('Tarjeta')">Tarjeta</button>
      <button class="met-btn" id="met-pedidosya" onclick="setMetodo('Pedidos Ya')">Pedidos Ya</button>
    </div>
    <div class="sec">Encargada</div>
    <select class="enc-select" id="encargada">
      <option value="">— Seleccionar —</option>
      <option>Wendy</option>
      <option>Deysi</option>
      <option>Marisol</option>
      <option>Otra</option>
    </select>
    <button class="btn-reg" id="btn-reg" onclick="registrarVenta()">Registrar venta</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycby_0-BmUk80e-KeKOHa0KzRLwY1QvSiqI-aS0JPvn7OCfPyiJSaxOqJGpADS86kmI0dXA/exec';
const TURNO='11am-8pm';
const CATS_ORDER=['Bebidas','Conos','Especialidades','Mini Especialidades','Peleteria','Envasados','Pasteles','Otros'];
let productos=[],catActiva='',orden=[],metodo='Efectivo',total=0;
async function cargarProductos(){
  try{
    const res=await fetch(SCRIPT_URL);
    const data=await res.json();
    if(data.success){productos=data.productos;renderCats();}
  }catch(e){
    document.getElementById('prods').innerHTML='<div style="grid-column:1/-1;color:#E24B4A;font-size:13px;text-align:center;padding:16px">Error al cargar productos</div>';
  }
}
function renderCats(){
  const cats=[...new Set(productos.map(p=>p.categoria))];
  cats.sort((a,b)=>{const ia=CATS_ORDER.indexOf(a),ib=CATS_ORDER.indexOf(b);return(ia===-1?99:ia)-(ib===-1?99:ib);});
  document.getElementById('cats').innerHTML=cats.map(c=>`<button class="cat-btn${c===catActiva?' active':''}" onclick="selCat('${c}')">${c}</button>`).join('');
}
function selCat(cat){
  catActiva=cat;renderCats();
  const prods=productos.filter(p=>p.categoria===cat);
  document.getElementById('prods').innerHTML=prods.map(p=>`<button class="prod-btn" onclick="agregarItem('${p.sku}')"><div class="prod-nombre">${p.producto}</div><div class="prod-precio">$${Number(p.precio).toFixed(2)}</div></button>`).join('');
}
function agregarItem(sku){
  const prod=productos.find(p=>p.sku===sku);if(!prod)return;
  const ex=orden.find(i=>i.sku===sku);
  if(ex){ex.qty++;}else{orden.push({sku,nombre:prod.producto,precio:Number(prod.precio),qty:1,categoria:prod.categoria,tamano:prod.tamano});}
  renderOrden();
}
function cambiarQty(sku,delta){
  const idx=orden.findIndex(i=>i.sku===sku);if(idx===-1)return;
  orden[idx].qty+=delta;if(orden[idx].qty<=0)orden.splice(idx,1);
  renderOrden();
}
function renderOrden(){
  const el=document.getElementById('orden');
  if(orden.length===0){el.innerHTML='<div class="orden-vacia">Sin productos aún</div>';total=0;}
  else{
    total=orden.reduce((s,i)=>s+i.precio*i.qty,0);
    el.innerHTML=orden.map(i=>`<div class="oitem"><div class="oitem-nombre">${i.nombre}</div><div class="qty-ctrl"><button class="qbtn" onclick="cambiarQty('${i.sku}',-1)">−</button><span class="qnum">${i.qty}</span><button class="qbtn" onclick="cambiarQty('${i.sku}',1)">+</button></div><div class="oitem-total">$${(i.precio*i.qty).toFixed(2)}</div></div>`).join('');
  }
  document.getElementById('total').textContent='$'+total.toFixed(2);
  calcVuelto();
}
function calcVuelto(){
  const billete=parseFloat(document.getElementById('billete').value)||0;
  const vuelto=billete-total;
  const el=document.getElementById('vuelto');
  el.textContent=vuelto>=0?'$'+vuelto.toFixed(2):'—';
  el.style.color=vuelto<0?'#E24B4A':'#27500A';
}
function setBillete(val){document.getElementById('billete').value=val;calcVuelto();}
function setMetodo(m){
  metodo=m;
  document.getElementById('met-efectivo').classList.toggle('active',m==='Efectivo');
  document.getElementById('met-tarjeta').classList.toggle('active',m==='Tarjeta');
  document.getElementById('met-pedidosya').classList.toggle('active',m==='Pedidos Ya');
}
async function registrarVenta(){
  if(orden.length===0){showToast('Agregá al menos un producto');return;}
  const encargada=document.getElementById('encargada').value;
  if(!encargada){showToast('Seleccioná la encargada');return;}
  const btn=document.getElementById('btn-reg');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Registrando...';
  try{
    for(const i of orden){
      await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({encargada,turno:TURNO,categoria:i.categoria,producto:i.nombre,tamano:i.tamano,cantidad:i.qty,precio_unitario:i.precio,total_venta:+(i.precio*i.qty).toFixed(2),metodo_pago:metodo})});
    }
    showToast('✓ Venta registrada');
    orden=[];renderOrden();
    document.getElementById('billete').value='';calcVuelto();
  }catch(e){showToast('Error al registrar');}
  btn.disabled=false;btn.innerHTML='Registrar venta';
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
cargarProductos();
</script>
</body>
</html>
